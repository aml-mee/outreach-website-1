<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlwaysOutreach — Hero Animation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1a35d4 0%, #2c4de8 40%, #1e3ac9 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ── Panel shell ── */
  .panel {
    width: 420px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05) inset;
  }

  .panel-titlebar {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .panel-title {
    margin-left: 6px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .live-badge {
    margin-left: auto;
    font-size: 10px;
    color: #4ade80;
    font-weight: 600;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80;
    animation: pulse-green 1.6s ease-in-out infinite;
  }
  @keyframes pulse-green {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }

  .panel-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── Prospect card ── */
  .prospect-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px;
  }
  .prospect-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .prospect-name { font-size: 14px; font-weight: 600; color: #fff; }
  .prospect-role { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  .research-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
  .tag {
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 20px;
    font-weight: 500;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.12);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    white-space: nowrap;
  }
  .tag.visible { opacity: 1; transform: translateY(0); }
  .tag.highlight {
    background: rgba(99,179,255,0.18);
    border-color: rgba(99,179,255,0.35);
    color: #93c5fd;
  }

  /* ── Email composer ── */
  .email-composer {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
  }
  .email-header {
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .email-field {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
  }
  .email-field-label {
    color: rgba(255,255,255,0.3);
    font-weight: 500;
    width: 40px;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .email-field-value { color: rgba(255,255,255,0.75); font-weight: 400; line-height: 1.4; }
  .email-field-value .cursor {
    display: inline-block;
    width: 1.5px; height: 12px;
    background: rgba(255,255,255,0.7);
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 0.85s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .email-body-area { padding: 12px 14px; }
  .email-body-text {
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    line-height: 1.65;
    min-height: 80px;
  }
  .email-body-text .highlight-word {
    color: #93c5fd;
    font-weight: 500;
  }

  /* ── Send button ── */
  .send-row {
    padding: 10px 14px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .send-btn {
    font-size: 12px;
    font-weight: 600;
    padding: 7px 16px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: #fff;
    cursor: default;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.3s, transform 0.2s;
  }
  .send-btn.sending {
    background: rgba(74,222,128,0.2);
    border-color: rgba(74,222,128,0.4);
    color: #4ade80;
    transform: scale(1.03);
  }
  .send-icon { font-size: 13px; }
  .uniqueness-note {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    font-style: italic;
  }

  /* ── Progress bar ── */
  .progress-bar-wrap {
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin: 4px 16px 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: rgba(147,197,253,0.5);
    border-radius: 2px;
    width: 0%;
    transition: width linear;
  }

  /* ── Prospect switcher dots ── */
  .switcher {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding-bottom: 14px;
  }
  .switcher-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s, transform 0.3s;
  }
  .switcher-dot.active {
    background: rgba(255,255,255,0.75);
    transform: scale(1.3);
  }

  /* transition fade */
  .card-fade { transition: opacity 0.35s ease; }
  .card-fade.hidden { opacity: 0; }
</style>
</head>
<body>

<div class="panel">
  <div class="panel-titlebar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="panel-title">Writing now</span>
    <span class="live-badge"><span class="live-dot"></span>LIVE</span>
  </div>

  <div class="panel-body">
    <!-- Prospect card -->
    <div class="prospect-card card-fade" id="prospect-card">
      <div class="prospect-header">
        <div class="avatar" id="avatar"></div>
        <div>
          <div class="prospect-name" id="prospect-name"></div>
          <div class="prospect-role" id="prospect-role"></div>
        </div>
      </div>
      <div class="research-label">Research intel</div>
      <div class="tags" id="tags"></div>
    </div>

    <!-- Email composer -->
    <div class="email-composer card-fade" id="email-composer">
      <div class="email-header">
        <div class="email-field">
          <span class="email-field-label">To</span>
          <span class="email-field-value" id="email-to"></span>
        </div>
        <div class="email-field">
          <span class="email-field-label">Subject</span>
          <span class="email-field-value" id="email-subject"></span>
        </div>
      </div>
      <div class="email-body-area">
        <div class="email-body-text" id="email-body"></div>
      </div>
      <div class="send-row">
        <button class="send-btn" id="send-btn">
          <span class="send-icon">✦</span>
          <span id="send-label">Send personalised email</span>
        </button>
        <span class="uniqueness-note" id="unique-note">1 of 1 ever sent</span>
      </div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <div class="switcher" id="switcher"></div>
</div>

<script>
const prospects = [
  {
    initials: 'LF',
    color: '#2a6db5',
    name: 'Lisa Fernandez',
    role: 'Facilities Director · Apex Tower Group',
    email: 'l.fernandez@apextowergroup.com',
    tags: [
      { label: '4 commercial office sites', highlight: true },
      { label: 'Current contract ending Sept', highlight: true },
      { label: 'Recent HSE compliance flag' },
      { label: 'Just opened new HQ in Canary Wharf', highlight: true },
    ],
    subject: "Apex's new Canary Wharf site — cleaning contract",
    body: `Hi Lisa — I saw that Apex Tower Group recently opened its new <span class="highlight-word">Canary Wharf headquarters</span>, which alongside your other three sites gives you a serious amount of floor space to manage.\n\nI also noticed there was a recent <span class="highlight-word">HSE compliance flag</span> — something we see fairly often when facilities teams are stretched across multiple buildings with a single contractor trying to cover everything.\n\nWith your <span class="highlight-word">current contract ending in September</span>, it feels like good timing to at least have a conversation. We specialise in multi-site commercial cleaning for property groups your size — dedicated site supervisors, daily compliance reporting, and full audit trails.\n\nWould it be worth a call in the next couple of weeks?`,
  },
  {
    initials: 'RB',
    color: '#7c5cbf',
    name: 'Rob Baxter',
    role: 'IT Director · Meridian Financial',
    email: 'r.baxter@meridianfinancial.co.uk',
    tags: [
      { label: 'FCA regulated, 400 staff' },
      { label: 'Suffered a phishing breach in Q1', highlight: true },
      { label: 'No dedicated security vendor', highlight: true },
      { label: 'Moving infrastructure to Azure', highlight: true },
    ],
    subject: "Meridian's Azure migration — security gap",
    body: `Hi Rob — I came across Meridian Financial while researching FCA-regulated firms going through <span class="highlight-word">Azure migrations</span> this year, and your situation stood out.\n\nCloud migrations at your scale almost always open up a window of vulnerability — particularly around <span class="highlight-word">identity and access management</span> — and for a regulated firm, that window is where most breaches happen. The <span class="highlight-word">Q1 phishing incident</span> suggests the exposure is already there before the migration even completes.\n\nWe work exclusively with financial services firms through infrastructure transitions, providing continuous threat monitoring and staff security training that maps to <span class="highlight-word">FCA operational resilience requirements</span>.\n\nI appreciate this is a sensitive area — happy to have a confidential conversation if useful?`,
  },
  {
    initials: 'GH',
    color: '#1a8f6f',
    name: 'Gareth Hughes',
    role: 'MD · Hughes Property Developments',
    email: 'g.hughes@hughesproperty.co.uk',
    tags: [
      { label: '3 live planning applications' },
      { label: 'Disputed title on flagship site', highlight: true },
      { label: 'Current solicitor not property specialist', highlight: true },
      { label: 'JV partner needed for Phase 2', highlight: true },
    ],
    subject: "The title dispute on your flagship site",
    body: `Hi Gareth — I was looking at Hughes Property\u2019s planning pipeline and noticed you have <span class="highlight-word">three live applications</span> running simultaneously, which is a lot to manage — particularly with the <span class="highlight-word">disputed title issue</span> on what looks like your flagship site.\n\nTitle disputes at planning stage can quietly derail an entire scheme if they\u2019re not handled by someone who understands both the legal and commercial dynamics of development. From what I can see, your <span class="highlight-word">current solicitor isn\u2019t a property specialist</span> — which may be adding risk you don\u2019t need right now.\n\nWe act for developers across the Midlands and South East on exactly these situations — title disputes, JV structuring, and planning agreements. We\u2019ve recently helped two developers resolve similar issues without losing their programme.\n\nWould it be useful to have an informal chat?`,
  },
];

let current = 0;
let animTimeout = [];

function clearTimers() { animTimeout.forEach(clearTimeout); animTimeout = []; }
function delay(fn, ms) { const t = setTimeout(fn, ms); animTimeout.push(t); return t; }

// Build switcher dots
const switcher = document.getElementById('switcher');
prospects.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'switcher-dot' + (i === 0 ? ' active' : '');
  d.id = `dot-${i}`;
  switcher.appendChild(d);
});

function typeInto(el, html, msPerChar, cb) {
  // We type the visible text char by char, but preserve HTML spans
  // Strategy: build full innerHTML, then reveal char by char using a character counter approach
  el.innerHTML = '';
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const fullText = temp.textContent;

  let charIndex = 0;
  const totalChars = fullText.length;

  function tick() {
    charIndex++;
    // Rebuild innerHTML up to charIndex visible chars
    el.innerHTML = revealChars(html, charIndex) + '<span class="cursor"></span>';
    if (charIndex < totalChars) {
      const t = setTimeout(tick, msPerChar + (Math.random() * msPerChar * 0.5));
      animTimeout.push(t);
    } else {
      el.innerHTML = html; // final, no cursor
      if (cb) cb();
    }
  }
  tick();
}

function revealChars(htmlStr, count) {
  // Walk through htmlStr, counting visible chars, stop at `count`
  let result = '';
  let i = 0;
  let visible = 0;
  while (i < htmlStr.length && visible < count) {
    if (htmlStr[i] === '<') {
      // find closing >
      const close = htmlStr.indexOf('>', i);
      if (close === -1) break;
      result += htmlStr.slice(i, close + 1);
      i = close + 1;
    } else if (htmlStr[i] === '&') {
      const semi = htmlStr.indexOf(';', i);
      if (semi !== -1 && semi - i <= 7) {
        result += htmlStr.slice(i, semi + 1);
        i = semi + 1;
        visible++;
      } else {
        result += htmlStr[i++];
        visible++;
      }
    } else {
      result += htmlStr[i++];
      visible++;
    }
  }
  return result;
}

function runProspect(idx) {
  const p = prospects[idx];
  clearTimers();

  // Update switcher
  prospects.forEach((_, i) => {
    document.getElementById(`dot-${i}`).className = 'switcher-dot' + (i === idx ? ' active' : '');
  });

  // Reset progress bar
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';

  // Fade out
  document.getElementById('prospect-card').classList.add('hidden');
  document.getElementById('email-composer').classList.add('hidden');

  delay(() => {
    // Set avatar
    const av = document.getElementById('avatar');
    av.textContent = p.initials;
    av.style.background = p.color;

    document.getElementById('prospect-name').textContent = p.name;
    document.getElementById('prospect-role').textContent = p.role;

    // Clear tags
    const tagsEl = document.getElementById('tags');
    tagsEl.innerHTML = '';

    // Clear email
    document.getElementById('email-to').textContent = '';
    document.getElementById('email-subject').textContent = '';
    document.getElementById('email-body').innerHTML = '';
    document.getElementById('send-btn').className = 'send-btn';
    document.getElementById('send-label').textContent = 'Send personalised email';

    // Fade in prospect card
    document.getElementById('prospect-card').classList.remove('hidden');
    document.getElementById('email-composer').classList.remove('hidden');

    // Animate tags in one by one
    let tagDelay = 300;
    p.tags.forEach((tag, i) => {
      const span = document.createElement('span');
      span.className = 'tag' + (tag.highlight ? ' highlight' : '');
      span.textContent = tag.label;
      tagsEl.appendChild(span);
      delay(() => span.classList.add('visible'), tagDelay);
      tagDelay += 280;
    });

    const afterTags = tagDelay + 200;

    // Type "To"
    delay(() => {
      const toEl = document.getElementById('email-to');
      typeInto(toEl, p.email, 28, () => {
        // Type subject
        delay(() => {
          const subEl = document.getElementById('email-subject');
          typeInto(subEl, p.subject, 22, () => {
            // Type body
            delay(() => {
              const bodyEl = document.getElementById('email-body');
              const bodyHtml = p.body.replace(/\n/g, '<br>');
              typeInto(bodyEl, bodyHtml, 14, () => {
                // Send button
                delay(() => {
                  const btn = document.getElementById('send-btn');
                  btn.classList.add('sending');
                  document.getElementById('send-label').textContent = 'Sent ✓';

                  // Start progress bar for next prospect
                  const CYCLE = 2400;
                  delay(() => {
                    bar.style.transition = `width ${CYCLE}ms linear`;
                    bar.style.width = '100%';
                  }, 100);

                  delay(() => {
                    const next = (idx + 1) % prospects.length;
                    runProspect(next);
                  }, CYCLE + 200);

                }, 500);
              });
            }, 200);
          });
        }, 300);
      });
    }, afterTags);

  }, 350);
}

runProspect(0);
</script>
</body>
</html>
